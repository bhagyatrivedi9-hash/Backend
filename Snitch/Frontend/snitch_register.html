<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SNITCH - Register</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;800;900&amp;family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "background": "#f9f9f9",
                      "on-secondary-fixed-variant": "#474646",
                      "outline": "#7e775f",
                      "secondary": "#5f5e5e",
                      "surface-container-lowest": "#ffffff",
                      "inverse-on-surface": "#f1f1f1",
                      "error": "#ba1a1a",
                      "surface-container-low": "#f3f3f3",
                      "on-error": "#ffffff",
                      "on-background": "#1b1b1b",
                      "on-primary-fixed-variant": "#544600",
                      "secondary-fixed": "#e5e2e1",
                      "tertiary": "#00696f",
                      "inverse-primary": "#e9c400",
                      "tertiary-fixed": "#79f5ff",
                      "secondary-fixed-dim": "#c8c6c5",
                      "primary": "#705d00",
                      "outline-variant": "#d0c6ab",
                      "tertiary-fixed-dim": "#00dbe8",
                      "on-primary-fixed": "#221b00",
                      "surface-tint": "#705d00",
                      "on-tertiary": "#ffffff",
                      "tertiary-container": "#00f1ff",
                      "surface-bright": "#f9f9f9",
                      "surface-container": "#eeeeee",
                      "surface-container-high": "#e8e8e8",
                      "surface-dim": "#dadada",
                      "on-tertiary-fixed-variant": "#004f54",
                      "primary-fixed-dim": "#e9c400",
                      "on-secondary-fixed": "#1c1b1b",
                      "surface-variant": "#e2e2e2",
                      "on-error-container": "#93000a",
                      "on-primary-container": "#705e00",
                      "on-tertiary-container": "#006a70",
                      "on-tertiary-fixed": "#002022",
                      "primary-container": "#ffd700",
                      "surface-container-highest": "#e2e2e2",
                      "on-surface-variant": "#4d4732",
                      "inverse-surface": "#303030",
                      "on-secondary-container": "#656464",
                      "secondary-container": "#e5e2e1",
                      "primary-fixed": "#ffe16d",
                      "on-secondary": "#ffffff",
                      "surface": "#f9f9f9",
                      "error-container": "#ffdad6",
                      "on-primary": "#ffffff",
                      "on-surface": "#1b1b1b"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "fontFamily": {
                      "headline": ["Epilogue"],
                      "body": ["Manrope"],
                      "label": ["Manrope"]
              }
            },
          }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #f9f9f9;
        }
        .editorial-header {
            font-family: 'Epilogue', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="text-on-background bg-background overflow-x-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white dark:bg-black flex items-center justify-between px-8 h-20 w-full no-line tonal transition via surface-container-low">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-black dark:text-white cursor-pointer hover:opacity-70 transition-opacity scale-95 active:transition-all">close</span>
</div>
<div class="absolute left-1/2 -translate-x-1/2">
<h1 class="text-2xl font-black tracking-tighter text-black dark:text-white font-['Epilogue'] tracking-tighter uppercase font-bold">SNITCH</h1>
</div>
<div class="hidden md:flex gap-8">
<a class="font-['Manrope'] tracking-widest text-[10px] uppercase text-gray-400 hover:text-black transition-colors" href="#">Shop</a>
<a class="font-['Manrope'] tracking-widest text-[10px] uppercase text-gray-400 hover:text-black transition-colors" href="#">Stories</a>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-black dark:text-white cursor-pointer hover:opacity-70 transition-opacity">shopping_bag</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="min-h-screen pt-32 pb-32 flex items-center justify-center px-6">
<div class="w-full max-w-4xl grid md:grid-cols-2 bg-surface-container-lowest overflow-hidden shadow-[0_20px_40px_rgba(27,27,27,0.04)]">
<!-- Left Side: Editorial Image/Atmosphere -->
<div class="hidden md:block relative overflow-hidden bg-surface-variant">
<img alt="SNITCH Editorial" class="absolute inset-0 w-full h-full object-cover grayscale contrast-125 opacity-90" data-alt="Editorial fashion photography of a modern minimalist streetwear outfit in high contrast lighting against a grey architectural background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC-zP1KHZWYypPS4ydDUmVLxLPmPNylyn_R1ZRV9o1BJXlX7eBIDc9J4YUrnx2j4kb4Bx5bUlonIH95TjcDtBIf01EjKi1WFqPBqxNvW_Lc8E9xtHHAh4p1tpnx6smN5gNpzjk2HerqRwWxhd5HykdxOdeq_ov_l6ivWXY3yf-N1m2emjgBv7tZKnOnxM9F9YepU8aj2vPbFWHp_v6VQuiUTTfrVYM71dFHZi_r9vc9LW8tzXH09LNs9JtMNJ3kpuqk1CTS1PUhq5T3"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent flex flex-col justify-end p-12">
<h2 class="editorial-header text-4xl font-black tracking-tighter text-white uppercase leading-none">The<br/>Digital<br/>Atelier</h2>
<p class="mt-4 text-white/70 font-['Manrope'] tracking-widest text-[10px] uppercase">Curating the modern wardrobe since 2024</p>
</div>
</div>
<!-- Right Side: Registration Form -->
<div class="p-8 md:p-16 flex flex-col justify-center">
<header class="mb-12">
<span class="font-['Manrope'] tracking-widest text-[10px] uppercase text-primary font-bold mb-2 block">Join the movement</span>
<h2 class="editorial-header text-3xl font-bold tracking-tighter text-on-background uppercase">Create Account</h2>
</header>
<form class="space-y-8">
<!-- User Type Selection (Toggle Style) -->
<div class="flex items-center bg-surface-container-low p-1 rounded-sm w-fit mb-4">
<label class="relative cursor-pointer">
<input checked="" class="peer sr-only" name="user_type" type="radio" value="buyer"/>
<div class="px-6 py-2 font-['Manrope'] tracking-widest text-[10px] uppercase font-bold text-gray-400 peer-checked:bg-white peer-checked:text-black transition-all">Buyer</div>
</label>
<label class="relative cursor-pointer">
<input class="peer sr-only" name="user_type" type="radio" value="seller"/>
<div class="px-6 py-2 font-['Manrope'] tracking-widest text-[10px] uppercase font-bold text-gray-400 peer-checked:bg-white peer-checked:text-black transition-all">Seller</div>
</label>
</div>
<!-- Input Fields -->
<div class="space-y-6">
<div class="group">
<label class="font-['Manrope'] tracking-widest text-[10px] uppercase text-gray-400 block mb-1" for="full_name">Full Name</label>
<input class="w-full bg-transparent border-none border-b border-outline-variant/30 py-2 px-0 focus:ring-0 focus:border-primary transition-all font-['Manrope'] text-sm uppercase tracking-tight placeholder:text-gray-300" id="full_name" placeholder="ALEX MERCER" type="text"/>
<div class="h-[1px] w-full bg-outline-variant/30 group-focus-within:bg-primary transition-colors"></div>
</div>
<div class="group">
<label class="font-['Manrope'] tracking-widest text-[10px] uppercase text-gray-400 block mb-1" for="email">Email Address</label>
<input class="w-full bg-transparent border-none border-b border-outline-variant/30 py-2 px-0 focus:ring-0 focus:border-primary transition-all font-['Manrope'] text-sm uppercase tracking-tight placeholder:text-gray-300" id="email" placeholder="ALEX@STUDIO.COM" type="email"/>
<div class="h-[1px] w-full bg-outline-variant/30 group-focus-within:bg-primary transition-colors"></div>
</div>
<div class="group">
<label class="font-['Manrope'] tracking-widest text-[10px] uppercase text-gray-400 block mb-1" for="contact">Contact Number</label>
<input class="w-full bg-transparent border-none border-b border-outline-variant/30 py-2 px-0 focus:ring-0 focus:border-primary transition-all font-['Manrope'] text-sm uppercase tracking-tight placeholder:text-gray-300" id="contact" placeholder="+1 234 567 890" type="tel"/>
<div class="h-[1px] w-full bg-outline-variant/30 group-focus-within:bg-primary transition-colors"></div>
</div>
<div class="group">
<label class="font-['Manrope'] tracking-widest text-[10px] uppercase text-gray-400 block mb-1" for="password">Password</label>
<input class="w-full bg-transparent border-none border-b border-outline-variant/30 py-2 px-0 focus:ring-0 focus:border-primary transition-all font-['Manrope'] text-sm uppercase tracking-tight placeholder:text-gray-300" id="password" placeholder="••••••••" type="password"/>
<div class="h-[1px] w-full bg-outline-variant/30 group-focus-within:bg-primary transition-colors"></div>
</div>
</div>
<!-- Submit Button -->
<button class="w-full mt-8 py-5 bg-gradient-to-r from-primary to-primary-container text-on-primary-fixed font-['Manrope'] tracking-widest text-[12px] uppercase font-black hover:opacity-90 active:scale-[0.98] transition-all shadow-lg" type="submit">
                        Create Account
                    </button>
<p class="mt-8 text-center font-['Manrope'] tracking-widest text-[10px] uppercase text-gray-400">
                        Already have an account? <a class="text-black font-bold hover:underline" href="#">Login</a>
</p>
</form>
</div>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full h-16 flex justify-around items-center px-6 pb-safe bg-white/80 dark:bg-black/80 backdrop-blur-xl shadow-[0_-10px_30px_rgba(0,0,0,0.03)] z-50">
<div class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-600 scale-90 duration-200 hover:text-black dark:hover:text-white transition-colors">
<span class="material-symbols-outlined">storefront</span>
<span class="font-['Manrope'] tracking-widest text-[10px] uppercase mt-1">Shop</span>
</div>
<div class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-600 scale-90 duration-200 hover:text-black dark:hover:text-white transition-colors">
<span class="material-symbols-outlined">search</span>
<span class="font-['Manrope'] tracking-widest text-[10px] uppercase mt-1">Search</span>
</div>
<div class="flex flex-col items-center justify-center text-gray-400 dark:text-gray-600 scale-90 duration-200 hover:text-black dark:hover:text-white transition-colors">
<span class="material-symbols-outlined">shopping_bag</span>
<span class="font-['Manrope'] tracking-widest text-[10px] uppercase mt-1">Bag</span>
</div>
<!-- Active: Profile (Since we are on registration/account page) -->
<div class="flex flex-col items-center justify-center text-black dark:text-white font-bold scale-90 duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-['Manrope'] tracking-widest text-[10px] uppercase mt-1">Profile</span>
</div>
</nav>
</body></html>
